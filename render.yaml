services:
  - type: web
    name: gym-tenaz-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENABLE_AUTOLOGIN
        value: false
      - key: ALLOWED_ORIGIN
        value: https://gym-tenaz.vercel.app
      - key: DATA_PATH
        value: /var/data/gym_data.json
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: gym-data
      mountPath: /var/data
      sizeGB: 1
