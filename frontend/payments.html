<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos – Gym-Tenaz</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body class="app-body">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">💪</span>
      <span class="sidebar-title">Gym-Tenaz</span>
      <button class="sidebar-close" id="sidebarClose">✕</button>
    </div>
    <ul class="sidebar-nav">
      <li><a href="/dashboard.html">📊 Dashboard</a></li>
      <li><a href="/members.html">👥 Miembros</a></li>
      <li><a href="/plans.html">📋 Planes</a></li>
      <li><a href="/payments.html" class="active">💰 Pagos</a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="btn btn-sm" id="logoutBtn">Cerrar Sesión</button>
    </div>
  </nav>
  <div class="overlay" id="overlay"></div>

  <main class="main-content">
    <header class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <h2>Pagos</h2>
    </header>

    <section class="card">
      <div class="card-header toolbar">
        <span></span>
        <button class="btn btn-primary" id="addPaymentBtn">+ Registrar Pago</button>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table" id="paymentsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Miembro</th>
                <th>Fecha Pago</th>
                <th>Meses</th>
                <th>Monto</th>
                <th>Descripción</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="paymentsBody">
              <tr><td colspan="7" class="text-center">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- New Payment Modal -->
  <div class="modal-overlay" id="paymentModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Registrar Pago</h3>
        <button class="modal-close" id="paymentModalClose">✕</button>
      </div>
      <div class="modal-body">
        <form id="paymentForm">
          <div class="form-group">
            <label>Miembro *</label>
            <select id="paymentMember" required>
              <option value="">Seleccionar miembro…</option>
            </select>
          </div>
          <div class="form-group" id="memberExpiryInfo" style="display:none;">
            <span class="badge badge-info" id="memberCurrentExpiry"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Fecha de Pago *</label>
              <input type="date" id="paymentDate" required>
            </div>
            <div class="form-group">
              <label>Meses *</label>
              <select id="paymentMonths" required>
                <option value="1">1 mes</option>
                <option value="2">2 meses</option>
                <option value="3">3 meses</option>
                <option value="4">4 meses</option>
                <option value="5">5 meses</option>
                <option value="6">6 meses</option>
                <option value="7">7 meses</option>
                <option value="8">8 meses</option>
                <option value="9">9 meses</option>
                <option value="10">10 meses</option>
                <option value="11">11 meses</option>
                <option value="12">12 meses</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Monto *</label>
              <input type="number" id="paymentAmount" min="0" step="0.01" required>
            </div>
            <div class="form-group">
              <label>Precio unitario del plan</label>
              <input type="number" id="planUnitPrice" min="0" step="0.01" readonly style="background:#f5f5f5;">
            </div>
          </div>
          <div class="form-group">
            <label>Descripción</label>
            <input type="text" id="paymentDescription" placeholder="Pago mensual…">
          </div>
          <div id="paymentFormError" class="alert alert-danger" style="display:none;"></div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancelPaymentBtn">Cancelar</button>
            <button type="submit" class="btn btn-primary">Registrar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/env.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/payments.js"></script>
</body>
</html>
